name: Deploy App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Print system info
        run: |
          echo "Running on self-hosted runner"
          uname -a

      - name: List files
        run: |
          ls -la
