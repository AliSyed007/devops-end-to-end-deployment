---
- name: Deploy Dockerized App
  hosts: web
  become: true

  tasks:

    - name: Remove old app directory
      file:
        path: /home/ec2-user/app
        state: absent

    - name: Create app directory
      file:
        path: /home/ec2-user/app
        state: directory
        owner: ec2-user
        group: ec2-user

    - name: Copy required files
      copy:
        src: "{{ item }}"
        dest: /home/ec2-user/app/
      loop:
        - ../app/index.html
        - ../nginx/default.conf
        - ../docker/Dockerfile

    - name: Build Docker image
      command: docker build -t devops-app /home/ec2-user/app

    - name: Stop and remove old container (if exists)
      shell: docker rm -f devops-container || true

    - name: Run new container
      command: docker run -d -p 80:80 --name devops-container devops-app
